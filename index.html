            text-transform: uppercase;

            background: #F9FAFB;

            background: #E5E7EB;

            align-items: center;

            font-size: 12px;
            font-weight: 700;
            color: #6B7280;
            flex-shrink: 0;

function renderReport(data) {
  const trendHtml = data.csatTrend
    ? `<div class="${data.csatTrendUp ? 'csat-trend-up' : 'csat-trend-down'}">${data.csatTrend}</div>`
    : '';

  const reasonsHtml = data.topReasons.map((r, i) => `
    <div class="reason-item">
      <div class="reason-num">${i + 1}</div>
      <div class="reason-content">
        <div class="reason-row">
          <div class="reason-text">${r.text}</div>
          ${r.count ? `<div class="reason-count">${r.count}</div>` : ''}
        </div>
        ${r.prominent ? `<div class="reason-prominent">${r.prominent}</div>` : ''}
      </div>
      <div class="reason-links">
        ${r.links.map(l => `<a href="${l.url}" target="_blank" class="reason-link">${l.label}</a>`).join('')}
      </div>
    </div>
  `).join('');

  const issuesHtml = data.topIssues.map((issue, i) => `
    <div class="issue-block">
      <div class="issue-header">
        <div class="issue-num">${i + 1}</div>
        <div class="issue-header-text">
          <span class="issue-title">${issue.title}</span>
          ${issue.subtitle ? `<span class="issue-subtitle"> — ${issue.subtitle}</span>` : ''}
        </div>
        ${issue.count ? `<div class="issue-count">${issue.count}</div>` : ''}
      </div>
      <div class="quotes">
        ${issue.quotes.map(q => `
          <div class="quote">
            <span class="quote-text">"${q.text}"</span>
            ${q.url ? `<a href="${q.url}" target="_blank" class="quote-link">View conversation ↗</a>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
    ${i < data.topIssues.length - 1 ? '<div class="divider"></div>' : ''}
  `).join('');

  return `
    <div class="header-card">
      <div class="report-meta">Helpmate User Feedback · ${data.timeframe}</div>
      <div class="report-title">${data.period}</div>
      <div class="csat-container">
        <div class="csat-score">${data.csat}</div>
        <div class="csat-meta">
          <div class="csat-label">Helpmate CSAT</div>
          ${data.csatUsers ? `<div class="csat-users">${data.csatUsers}</div>` : ''}
          ${trendHtml}
        </div>
      </div>
      ${data.dataLink ? `<div class="report-datalink"><a href="${data.dataLink}" target="_blank">📊 Browse example conversations (Google Sheet) ↗</a></div>` : ''}
    </div>
    <div class="card">
      <div class="card-title">Top reasons for bad score</div>
      ${reasonsHtml}
    </div>
    <div class="card">
      <div class="card-title">Top issues from free text</div>
      ${issuesHtml}
    </div>
  `;
}

function init() {
  const nav = document.getElementById('nav');
  const content = document.getElementById('content');

  REPORTS.forEach((report, i) => {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === REPORTS.length - 1 ? ' active' : '');
    btn.textContent = report.period;
    btn.onclick = () => {
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.report').forEach(r => r.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('report-' + i).classList.add('active');
    };
    nav.appendChild(btn);

    // Report section
    const section = document.createElement('div');
    section.className = 'report' + (i === REPORTS.length - 1 ? ' active' : '');
    section.id = 'report-' + i;
    section.innerHTML = renderReport(report);
    content.appendChild(section);
  });
}

init();
</script>


</body></html>
